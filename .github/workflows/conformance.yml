name: Contract Conformance

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  conformance:
    uses: octomil/octomil-contracts/.github/workflows/sdk-conformance.yml@v1.22.0
    with:
      sdk: browser
      contract-version: "1.22.0"
      setup-command: "corepack enable && pnpm install --frozen-lockfile"
      codegen-command: "python3 .contract/scripts/sync_generated.py --sdk browser --check --target-dir src/_generated"
      test-command: "pnpm vitest run tests/conformance/contract.test.ts --reporter=default && python3 .contract/ci/audit-sdks.py --sdk browser --sdk-path . --out parity_report.json"
      parity-report-path: parity_report.json
      parity-score-floor: 60
    secrets: inherit
