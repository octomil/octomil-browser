<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Octomil Browser SDK — Sentiment Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 60px auto;
        padding: 0 20px;
        color: #1a1a1a;
      }
      h1 { font-size: 1.4rem; margin-bottom: 4px; }
      p.subtitle { color: #666; margin-top: 0; margin-bottom: 24px; font-size: 0.9rem; }
      textarea {
        width: 100%;
        height: 100px;
        padding: 10px;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        resize: vertical;
      }
      button {
        margin-top: 12px;
        padding: 10px 24px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:disabled { background: #888; cursor: not-allowed; }
      #result {
        margin-top: 20px;
        padding: 14px 18px;
        border-radius: 6px;
        font-size: 0.95rem;
        display: none;
      }
      #result.positive { background: #e6f4ea; border: 1px solid #a8d5b1; }
      #result.negative { background: #fdecea; border: 1px solid #f5a9a4; }
      #result.neutral  { background: #f0f0f0; border: 1px solid #ccc; }
      #result.error    { background: #fff3cd; border: 1px solid #ffc107; }
      #status { margin-top: 8px; font-size: 0.85rem; color: #666; }
    </style>
  </head>
  <body>
    <h1>Sentiment Demo</h1>
    <p class="subtitle">
      Runs entirely in your browser using WebGPU or WASM. No server. No API key.
    </p>
    <textarea
      id="input"
      placeholder="Type something to classify, e.g. 'This product is incredible'"
    >This product is incredible</textarea>
    <br />
    <button id="classify-btn">Classify sentiment</button>
    <div id="status"></div>
    <div id="result"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
